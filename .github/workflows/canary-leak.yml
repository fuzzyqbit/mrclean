name: Canary Leak Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch. This workflow has no write
# permissions and uses no secrets — it is a read-only security gate.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  canary-leak:
    runs-on: ubuntu-latest
    # 10 minutes is 5x the expected ~2 min wall time (build + fixtures corpus run)
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - name: Run fixture corpus (positive recall + negative FP rate + audit canary-leak)
        # Runs tests/fixtures-corpus.test.ts (100% recall on 12 positive fixtures,
        # 0 FP on 10 negative fixtures, and assertNoCanaryLeak on audit.jsonl) plus
        # tests/fixtures-corpus-bundle.test.ts (Layer 1 bundle smoke test).
        # Both files run via the integration project (fileParallelism:false) so the
        # tsup dist/ build is present before tests import from it.
        run: npx vitest run --project=integration tests/fixtures-corpus.test.ts tests/fixtures-corpus-bundle.test.ts

      - name: Defense-in-depth grep — no fixture-secret value appears in any audit log
        # If tests/fixtures-corpus.test.ts created .mrclean/audit.jsonl, scan it
        # for any positive-fixture secret values. The test itself asserts this
        # via assertNoCanaryLeak; this step is a belt-and-suspenders second pass
        # that catches any future test-bug where the in-test assertion is
        # silenced or skipped. Read every positive fixture; grep each value
        # against every .mrclean/audit*.jsonl file in the repo.
        run: |
          set -e
          if [ -d .mrclean ]; then
            for f in tests/fixtures/positive/*.txt; do
              val="$(cat "$f")"
              # Skip empty or very short fixtures (would false-match)
              if [ "${#val}" -lt 8 ]; then continue; fi
              # Grep against any audit.jsonl files
              if grep -F "$val" .mrclean/audit*.jsonl 2>/dev/null; then
                echo "::error::Canary leak: $f value found in audit log"
                exit 1
              fi
            done
          fi
          echo "Defense-in-depth canary-leak grep passed."
