name: Performance Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch so successive pushes don't queue
# redundant perf runs. Auth gates: this workflow has no write permissions and
# uses no secrets — it cannot leak credentials it doesn't have (T-03-02-04).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  perf:
    runs-on: ubuntu-latest
    # 10 minutes is 5x the expected ~2 min wall time (50 iterations × ~20ms × 2 + build)
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - name: Run perf gate
        # --project=integration: perf tests live in the integration project
        # (fileParallelism:false) per vitest.config.ts split added in plan 03-00.
        # The test output (console.log of p95 values) appears in this run step's
        # log — per-commit latency trend is visible in the CI UI without artifact
        # upload. A future plan may add p95 artifact aggregation if trend tracking
        # is desired across commits.
        run: npx vitest run --project=integration tests/perf/
